spring.application.name=ShortBrew
spring.threads.virtual.enabled=true

# --- Database ---
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:shortbrew}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:password}

# --- Redis ---
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
URL_CACHE_TTL_SECONDS=${URL_CACHE_TTL_SECONDS:3600}

# --- RabbitMQ ---
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# --- Security / JWT ---
jwt.secret=${JWT_SECRET:${SECRET_KEY:default-secret-key-should-be-replaced-in-production-1234567890}}

# --- Short URL Base ---
shortbrew.base-url=${SHORTBREW_BASE_URL:${SHORT_URL_BASE:http://localhost:8080/}}

# --- CORS ---
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# --- Logging & Debug ---
debug=${DEBUG:false}
logging.json.enabled=${LOG_JSON:true}
logging.level.root=${LOG_LEVEL:INFO}

# --- Rate Limits ---
rate-limit.create.max=${RATE_LIMIT_CREATE_MAX:30}
rate-limit.create.window-seconds=${RATE_LIMIT_CREATE_WINDOW_SECONDS:60}
rate-limit.redirect.max=${RATE_LIMIT_REDIRECT_MAX:100}
rate-limit.redirect.window-seconds=${RATE_LIMIT_REDIRECT_WINDOW_SECONDS:60}

# Expose health check (for Nginx) and prometheus metrics endpoints
management.endpoints.web.exposure.include=health,prometheus
# Show detailed health components (Redis status, Database status, RabbitMQ status)
management.endpoint.health.show-details=always
# Enable HTTP server request duration percentiles histogram for histogram_quantile support
management.metrics.distribution.percentiles-histogram.http.server.requests=true